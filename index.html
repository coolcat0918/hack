<!DOCTYPE html>
<html>
<head>
  <title>Hacker Terminal</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: tahoma;
      margin: 0;
      padding: 20px;
      overflow: hidden;
    }
    #screen {
      white-space: pre-wrap;
      font-size: 15px;
    }
    #loginBox {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    input {
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 5px;
      margin: 5px;
    }
    button {
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h2>SECURE LOGIN</h2>
  <input id="id" placeholder="ID"><br>
  <input id="pw" type="password" placeholder="PASSWORD"><br>
  <button onclick="login()">ENTER</button>
</div>

<div id="screen"></div>

<script>
const screen = document.getElementById("screen");
let hacking = false;

// 타이핑 사운드
const audio = new Audio("https://www.soundjay.com/mechanical/keyboard-1.mp3");

// 로그인
function login() {
  document.getElementById("loginBox").style.display = "none";
  hacking = true;
  startHack();
}

// 해킹 연출
function startHack() {
  let steps = [
    "Connecting to server...",
    "Bypassing firewall...",
    "Injecting payload...",
    "Access Denied...",
    "Retrying...",
    "Access Granted!",
    "Downloading data..."
  ];

  let i = 0;
  let interval = setInterval(() => {
    screen.textContent += steps[i] + "\n";
    i++;
    if (i >= steps.length) {
      clearInterval(interval);
      fakeErrors();
    }
  }, 500);
}

// 가짜 에러 폭주
function fakeErrors() {
  let count = 0;
  let interval = setInterval(() => {
    screen.textContent += "ERROR 0x" + Math.floor(Math.random()*9999) + "\n";
    count++;
    if (count > 30) {
      clearInterval(interval);
      screen.textContent += "\nSYSTEM OVERRIDE COMPLETE\n";
      startTyping();
    }
  }, 50);
}

// 해커 타이핑 코드
const code = `
# ============================================
# ULTRA CYBER HACKING INTERFACE v9.7.3
# (Totally Fake – For Entertainment Only)
# ============================================

import time
import random
import sys

TARGET = "GLOBAL_SECURE_MAINFRAME"
ACCESS_LEVEL = 0

def typing_effect(text, delay=0.02):
    for char in text:
        sys.stdout.write(char)
        sys.stdout.flush()
        time.sleep(delay)
    print()

def initialize_sequence():
    typing_effect("[+] Initializing quantum breach protocol...")
    time.sleep(1)
    typing_effect("[+] Bypassing neural firewall...")
    time.sleep(1)
    typing_effect("[+] Injecting polymorphic packets...")
    time.sleep(1)

def brute_force():
    global ACCESS_LEVEL
    typing_effect("[*] Starting brute force attack on encrypted node...")
    for i in range(0, 101, random.randint(1,5)):
        bar = "#" * (i // 2)
        sys.stdout.write(f"\r[ACCESS] [{bar:<50}] {i}%")
        sys.stdout.flush()
        time.sleep(0.1)
    print()
    ACCESS_LEVEL = 1
    typing_effect("[+] Encryption cracked successfully!")

def decrypt_mainframe():
    typing_effect("[*] Decrypting mainframe layers...")
    layers = ["ALPHA", "BETA", "GAMMA", "OMEGA"]
    for layer in layers:
        typing_effect(f"    -> Breaching Layer {layer}...")
        time.sleep(0.7)
    typing_effect("[+] All layers decrypted.")

def upload_payload():
    typing_effect("[*] Uploading payload to target system...")
    for i in range(10):
        typing_effect(f"    Injecting module_{random.randint(1000,9999)}.dll")
        time.sleep(0.2)
    typing_effect("[+] Payload successfully deployed.")

def override_security():
    typing_effect("[*] Overriding AI security protocols...")
    for i in range(5):
        typing_effect(f"    Disabling defense node {i}...")
        time.sleep(0.5)
    typing_effect("[+] Security overridden.")

def final_access():
    typing_effect("[*] Establishing root access...")
    time.sleep(1)
    typing_effect("[+] ACCESS GRANTED")
    typing_effect("[!] Welcome, Operator.")

def main():
    typing_effect("=== CYBER ATTACK INTERFACE ACTIVATED ===\n", 0.03)
    
    initialize_sequence()
    brute_force()

    if ACCESS_LEVEL == 1:
        decrypt_mainframe()
        upload_payload()
        override_security()
        final_access()

    typing_effect("\n[✓] Operation completed successfully.")
    typing_effect("[✓] Disconnecting trace signals...")
    time.sleep(1)
    typing_effect("[✓] You were never here.\n")

if __name__ == "__main__":
    main()
`;

let index = 0;

function startTyping() {
  document.addEventListener("keydown", () => {
    if (!hacking) return;

    audio.currentTime = 0;
    audio.play();

    for (let i = 0; i < 5; i++) {
      if (index < code.length) {
        screen.textContent += code[index];
        index++;
      }
    }

    window.scrollTo(0, document.body.scrollHeight);
  });
}
</script>

</body>
</html>
